<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Un message pour toi</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f8ff; /* AliceBlue */
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'cursive';
            overflow: hidden;
        }

        #message {
            position: absolute;
            top: 5%;
            padding: 20px 30px;
            background-color: rgba(255, 182, 193, 0.9); /* LightPink */
            border-radius: 30px;
            text-align: center;
            font-size: 2em;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
            z-index: 10;
            border: 3px solid white;
            min-height: 1.5em; /* Prevent layout shift */
        }

        .scene {
            position: relative;
            width: 400px;
            height: 400px;
            margin-top: 100px;
        }

        .bear {
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 250px;
            height: 300px;
            animation: breathe 4s ease-in-out infinite;
        }

        .bear-body {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 180px;
            height: 220px;
            background: white;
            border-radius: 50% 50% 35% 35%;
            box-shadow: 0 10px 15px rgba(0,0,0,0.1);
        }

        .head {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            height: 130px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .ear {
            position: absolute;
            top: -10px;
            width: 40px;
            height: 40px;
            background: white;
            border-radius: 50%;
            border: 5px solid #e6e6e6;
        }

        .ear.left { left: 0px; }
        .ear.right { right: 0px; }

        .eye {
            position: absolute;
            top: 50px;
            width: 12px;
            height: 12px;
            background: #2c2c2c;
            border-radius: 50%;
        }

        .eye.left { left: 40px; }
        .eye.right { right: 40px; }

        .snout {
            position: absolute;
            top: 65px;
            left: 50%;
            transform: translateX(-50%);
            width: 50px;
            height: 40px;
            background: #f5f5f5;
            border-radius: 50%;
        }

        .nose {
            position: absolute;
            top: 5px;
            left: 50%;
            transform: translateX(-50%);
            width: 18px;
            height: 12px;
            background: #2c2c2c;
            border-radius: 50% 50% 40% 40% / 60% 60% 40% 40%;
        }

        .paw {
            position: absolute;
            bottom: 50px;
            width: 50px;
            height: 70px;
            background: white;
            border-radius: 50% 50% 40% 40%;
            z-index: 1;
        }

        .paw.left {
            left: 0;
            transform-origin: top right;
        }

        .paw.left.writing {
            animation: write 0.4s ease-in-out infinite;
        }

        .paw.right {
            right: 0;
        }

        .heart {
            position: absolute;
            top: 40%;
            left: 75%;
            width: 80px;
            height: 80px;
            animation: pulse 1.5s ease-in-out infinite;
        }

        .heart::before,
        .heart::after {
            content: '';
            position: absolute;
            left: 40px;
            top: 0;
            width: 40px;
            height: 64px;
            background: #ff4757;
            border-radius: 40px 40px 0 0;
            transform: rotate(-45deg);
            transform-origin: 0 100%;
        }

        .heart::after {
            left: 0;
            transform: rotate(45deg);
            transform-origin: 100% 100%;
        }

        @keyframes write {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-8px) rotate(-8deg); }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }

        @keyframes breathe {
            0% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0); }
        }

        @keyframes blink {
            from, to { color: transparent; }
            50% { color: white; }
        }

        #message.typing-cursor::after {
            content: '▋';
            margin-left: 5px;
            animation: blink 1s step-end infinite;
        }

    </style>
</head>
<body>
    <div id="message">
        Réveille-toi ma princesse 💕💕❤️ et passe une bonne journée
    </div>
    <div class="scene">
        <div class="bear">
            <div class="bear-body"></div>
            <div class="head">
                <div class="ear left"></div>
                <div class="ear right"></div>
                <div class="eye left"></div>
                <div class="eye right"></div>
                <div class="snout">
                    <div class="nose"></div>
                </div>
            </div>
            <div class="paw left"></div>
            <div class="paw right"></div>
        </div>
        <div class="heart"></div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const messageEl = document.getElementById('message');
            const pawEl = document.querySelector('.paw.left');
            const originalText = messageEl.innerHTML;
            messageEl.innerHTML = '';

            let i = 0;
            const typingSpeed = 120; // ms per character

            function typeWriter() {
                if (i < originalText.length) {
                    messageEl.innerHTML += originalText.charAt(i);
                    i++;
                    setTimeout(typeWriter, typingSpeed);
                } else {
                    // Stop paw animation and remove cursor when done
                    pawEl.classList.remove('writing');
                    messageEl.classList.remove('typing-cursor');
                }
            }

            // Start after a short delay
            setTimeout(() => {
                messageEl.classList.add('typing-cursor');
                pawEl.classList.add('writing');
                typeWriter();
            }, 1000);
        });
    </script>
</body>
</html>
