<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Un Message Spécial</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #d0e8f2; /* Light blue sky */
        }
        /* Import a nice handwriting font from Google Fonts */
        @import url('https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap');

        .container {
            text-align: center;
        }

        svg {
            width: 90vw;
            max-width: 600px;
            overflow: visible; /* Make sure shadows aren't clipped */
        }

        /* Styling for the message text */
        .message-text {
            font-size: 32px;
            font-family: 'Patrick Hand', cursive;
            fill: none; /* Initially transparent fill */
            stroke: #5c4a3d; /* Dark brown text stroke */
            stroke-width: 0.8;
        }
    </style>
</head>
<body>
    <div class="container">
        <svg viewBox="0 0 400 400">
            <defs>
                <!-- A drop shadow filter for a bit of depth -->
                <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
                    <feGaussianBlur in="SourceAlpha" stdDeviation="3" result="blur"/>
                    <feOffset in="blur" dx="4" dy="4" result="offsetBlur"/>
                    <feMerge>
                        <feMergeNode in="offsetBlur"/>
                        <feMergeNode in="SourceGraphic"/>
                    </feMerge>
                </filter>
                 <!-- Heart path for reuse -->
                <path id="heart-path" d="M10,30 A20,20,0,0,1,50,30 A20,20,0,0,1,90,30 Q90,60,50,90 Q10,60,10,30 Z" />
                <!-- Path for the paw to follow -->
                <path id="paw-motion-path" d="M-5,100 C 40,20 150,150 250,50 S 350,100 350,100" fill="none" stroke="none" />
            </defs>

            <!-- The Bear -->
            <g id="bear" transform="translate(150, 150)" filter="url(#shadow)">
                <!-- Body -->
                <path d="M-60,120 C-90,120 -110,80 -110,40 C-110,0 -80,-20 -40,-20 C0,-20 20,0 20,40 C20,80 0,120 -30,120 Z" fill="#ffffff" stroke="#e0e0e0" stroke-width="2"/>
                <!-- Head -->
                <g id="head" transform="translate(0,0)">
                    <circle cx="-15" cy="-40" r="50" fill="#ffffff" stroke="#e0e0e0" stroke-width="2"/>
                    <circle cx="-55" cy="-80" r="15" fill="#ffffff" stroke="#e0e0e0" stroke-width="2"/>
                    <circle cx="25" cy="-80" r="15" fill="#ffffff" stroke="#e0e0e0" stroke-width="2"/>
                    <ellipse cx="-15" cy="-30" rx="25" ry="20" fill="#f5f5f5"/>
                    <circle cx="-35" cy="-50" r="4" fill="#2c2c2c"/>
                    <circle cx="5" cy="-50" r="4" fill="#2c2c2c"/>
                    <path d="M-22,-35 Q-15,-25 -8,-35 Z" fill="#2c2c2c"/>
                </g>
                <!-- Static Paw -->
                <path d="M-90,50 C-100,50 -110,60 -110,80 C-110,100 -90,110 -80,100 Z" fill="#ffffff" stroke="#e0e0e0" stroke-width="2"/>
                <!-- Writing Paw -->
                <g id="writing-paw" transform="translate(50, -100)">
                    <path d="M-10,60 C-20,60 -30,70 -30,90 C-30,110 -10,120 0,110 Z" fill="#ffffff" stroke="#e0e0e0" stroke-width="2" transform="rotate(20)"/>
                    <animateMotion dur="11s" begin="1s" fill="freeze" rotate="auto">
                        <mpath href="#paw-motion-path"/>
                    </animateMotion>
                </g>
            </g>

            <!-- The Heart -->
            <g id="heart" transform="translate(280, 200)">
                 <use href="#heart-path" fill="#ff4757"/>
                 <animateTransform attributeName="transform" type="scale" values="1; 1.1; 1" begin="0s" dur="1.5s" repeatCount="indefinite" additive="sum"/>
            </g>

            <!-- The message text -->
            <g id="message-group" transform="translate(20, 50)">
                <text class="message-text" y="0" style="stroke-dasharray: 800; stroke-dashoffset: 800;">
                    Réveille-toi ma princesse 💕💕❤️
                    <animate attributeName="stroke-dashoffset" from="800" to="0" dur="6s" begin="1s" fill="freeze" />
                    <animate attributeName="fill" from="none" to="#5c4a3d" dur="0.1s" begin="7s" fill="freeze" />
                </text>
                <text class="message-text" y="40" style="stroke-dasharray: 600; stroke-dashoffset: 600;">
                    et passe une bonne journée
                    <animate attributeName="stroke-dashoffset" from="600" to="0" dur="5s" begin="7s" fill="freeze" />
                    <animate attributeName="fill" from="none" to="#5c4a3d" dur="0.1s" begin="12s" fill="freeze" />
                </text>
            </g>
        </svg>
    </div>
</body>
</html>
