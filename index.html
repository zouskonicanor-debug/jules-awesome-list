<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Un message pour toi</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            background-color: #f0f8ff; /* AliceBlue */
        }
        #message {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 20px;
            background-color: rgba(255, 182, 193, 0.8); /* LightPink with transparency */
            border-radius: 20px;
            text-align: center;
            font-size: 24px;
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            z-index: 10;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>
    <div id="message">
        Réveille-toi ma princesse 💕💕❤️ et passe une bonne journée
    </div>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // Scene
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xf0f8ff);

        // Camera
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 5;

        // Renderer
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Controls
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
        scene.add(ambientLight);
        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(5, 10, 7.5);
        scene.add(directionalLight);

        // Bear
        const bear = new THREE.Group();
        const bearMaterial = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.8 });

        // Body
        const body = new THREE.Mesh(new THREE.SphereGeometry(1, 32, 32), bearMaterial);
        const bodyInitialY = -0.5;
        body.position.y = bodyInitialY;
        bear.add(body);

        // Head Group
        const headGroup = new THREE.Group();
        headGroup.position.y = 0.8;
        bear.add(headGroup);

        // Head
        const head = new THREE.Mesh(new THREE.SphereGeometry(0.7, 32, 32), bearMaterial);
        headGroup.add(head);

        // Ears
        const earGeometry = new THREE.SphereGeometry(0.25, 32, 32);
        const leftEar = new THREE.Mesh(earGeometry, bearMaterial);
        leftEar.position.set(-0.5, 0.6, 0);
        headGroup.add(leftEar);
        const rightEar = new THREE.Mesh(earGeometry, bearMaterial);
        rightEar.position.set(0.5, 0.6, 0);
        headGroup.add(rightEar);

        // Snout
        const snoutMaterial = new THREE.MeshStandardMaterial({ color: 0xeeeeee });
        const snout = new THREE.Mesh(new THREE.SphereGeometry(0.2, 32, 32), snoutMaterial);
        snout.position.set(0, -0.1, 0.6);
        snout.scale.z = 1.5;
        headGroup.add(snout);

        // Nose
        const noseMaterial = new THREE.MeshStandardMaterial({ color: 0x000000 });
        const nose = new THREE.Mesh(new THREE.SphereGeometry(0.08, 32, 32), noseMaterial);
        nose.position.set(0, -0.05, 0.8);
        headGroup.add(nose);

        // Eyes
        const eyeGeometry = new THREE.SphereGeometry(0.08, 32, 32);
        const leftEye = new THREE.Mesh(eyeGeometry, noseMaterial);
        leftEye.position.set(-0.25, 0.1, 0.55);
        headGroup.add(leftEye);
        const rightEye = new THREE.Mesh(eyeGeometry, noseMaterial);
        rightEye.position.set(0.25, 0.1, 0.55);
        headGroup.add(rightEye);

        bear.scale.set(1.5, 1.5, 1.5);
        scene.add(bear);

        // Heart
        const heartShape = new THREE.Shape();
        heartShape.moveTo(0.25, 0.25);
        heartShape.bezierCurveTo(0.25, 0.25, 0.2, 0, 0, 0);
        heartShape.bezierCurveTo(-0.3, 0, -0.3, 0.35, -0.3, 0.35);
        heartShape.bezierCurveTo(-0.3, 0.55, -0.1, 0.77, 0.25, 0.95);
        heartShape.bezierCurveTo(0.6, 0.77, 0.8, 0.55, 0.8, 0.35);
        heartShape.bezierCurveTo(0.8, 0.35, 0.8, 0, 0.5, 0);
        heartShape.bezierCurveTo(0.35, 0, 0.25, 0.25, 0.25, 0.25);

        const heartGeometry = new THREE.ShapeGeometry(heartShape);
        const heartMaterial = new THREE.MeshBasicMaterial({ color: 0xff0000 });
        const heart = new THREE.Mesh(heartGeometry, heartMaterial);
        const heartInitialY = 1;
        heart.scale.set(3, 3, 3);
        heart.position.set(0, heartInitialY, -2);
        heart.rotation.z = Math.PI;
        scene.add(heart);

        // Handle window resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Animation loop
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            const time = Date.now() * 0.001; // Current time in seconds

            // Make the heart float smoothly
            heart.position.y = heartInitialY + Math.sin(time * 2) * 0.2;
            heart.rotation.y += 0.01;

            // --- Bear Animation ---
            const animationTime = time * 1.5;

            // Head tilt
            headGroup.rotation.z = Math.sin(animationTime * 1.2) * 0.15; // Side to side tilt
            headGroup.rotation.y = Math.sin(animationTime * 0.8) * 0.1;  // Gentle turn

            // Breathing
            const breathCycle = Math.sin(animationTime);
            body.position.y = bodyInitialY + breathCycle * 0.03;

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
